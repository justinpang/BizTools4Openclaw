<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>登录 · BizTools4Openclaw 管理后台</title>
<link rel="stylesheet" href="/admin/static/css/admin.css"/>
</head>
<body class="login-body">
  <div class="login-card">
    <h1>🔒 管理后台登录</h1>
    <p class="hint">账号 / 密码 由运维配置（如使用默认配置，首次登录请改密）。</p>
    <form method="POST" action="/admin/login">
      <label>账号 <input type="text" name="username" required placeholder="admin"/></label>
      <label>密码 <input type="password" name="password" required placeholder="••••••"/></label>
      <button type="submit">登 录</button>
    </form>
    <p class="footer">© BizTools4Openclaw · 登录凭证加密存储于 Redis，会话自动过期。</p>
  </div>
</body>
</html>
